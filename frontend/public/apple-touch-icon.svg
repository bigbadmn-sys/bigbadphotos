<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Background -->
  <rect width="180" height="180" fill="#0e0e0e"/>

  <!-- Outer lens ring -->
  <circle cx="90" cy="90" r="76" fill="none" stroke="#69daff" stroke-width="3" opacity="0.9"/>

  <!-- Mid ring -->
  <circle cx="90" cy="90" r="50" fill="none" stroke="#69daff" stroke-width="2" opacity="0.45"/>

  <!-- Aperture blade tick marks (6-blade) -->
  <g stroke="#69daff" stroke-width="4" stroke-linecap="round" opacity="0.8">
    <line x1="90"   y1="18"  x2="90"   y2="40"/>
    <line x1="90"   y1="162" x2="90"   y2="140"/>
    <line x1="152"  y1="54"  x2="134"  y2="64"/>
    <line x1="28"   y1="126" x2="46"   y2="116"/>
    <line x1="152"  y1="126" x2="134"  y2="116"/>
    <line x1="28"   y1="54"  x2="46"   y2="64"/>
  </g>

  <!-- Center lens element -->
  <circle cx="90" cy="90" r="24" fill="#69daff"/>

  <!-- Lens reflection -->
  <circle cx="82" cy="82" r="6" fill="white" opacity="0.25"/>
  <circle cx="80" cy="80" r="2.5" fill="white" opacity="0.5"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#0e0e0e"/>
  <!-- Outer lens ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#69daff" stroke-width="1.5"/>
  <!-- Mid ring -->
  <circle cx="16" cy="16" r="7.5" fill="none" stroke="#69daff" stroke-width="1" opacity="0.5"/>
  <!-- Aperture blades (6-blade, simplified) -->
  <g stroke="#69daff" stroke-width="1.2" stroke-linecap="round" opacity="0.75">
    <line x1="16" y1="4.5"  x2="16" y2="9"/>
    <line x1="16" y1="23"   x2="16" y2="27.5"/>
    <line x1="24.9" y1="10.5" x2="21" y2="12.7"/>
    <line x1="11"   y1="19.3" x2="7.1" y2="21.5"/>
    <line x1="24.9" y1="21.5" x2="21" y2="19.3"/>
    <line x1="11"   y1="12.7" x2="7.1" y2="10.5"/>
  </g>
  <!-- Center element -->
  <circle cx="16" cy="16" r="3.5" fill="#69daff"/>
</svg>

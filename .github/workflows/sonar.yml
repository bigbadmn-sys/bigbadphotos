name: SonarQube Analysis

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Collect SonarCloud Security Hotspots (PR)
        if: always() && github.event_name == 'pull_request'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -u

          PROJECT_KEY="$(grep '^sonar.projectKey=' sonar-project.properties | cut -d= -f2)"

          echo "## SonarCloud Security Hotspots (PR #${PR_NUMBER})" > sonar_report.md
          echo "" >> sonar_report.md
          echo "- Project: \`${PROJECT_KEY}\`" >> sonar_report.md
          echo "- PR: #${PR_NUMBER}" >> sonar_report.md
          echo "" >> sonar_report.md

          # SonarCloud hotpots are not returned by /api/issues/search; use /api/hotspots/search.
          # Don't fail the whole job if this fetch fails; we still want a comment.
          HOTSPOTS_URL="${SONAR_HOST_URL}/api/hotspots/search?projectKey=${PROJECT_KEY}&pullRequest=${PR_NUMBER}&ps=50"
          echo "- Hotspots API: \`${HOTSPOTS_URL}\`" >> sonar_report.md
          echo "" >> sonar_report.md

          http_code="$(
            curl -sS -u "${SONAR_TOKEN}:" -o sonar_hotspots.json -w "%{http_code}" \
              "${HOTSPOTS_URL}" || true
          )"
          echo "- Hotspots API HTTP: \`${http_code}\`" >> sonar_report.md
          echo "" >> sonar_report.md

          python - <<'PY'
          import json
          import pathlib

          p = pathlib.Path("sonar_hotspots.json")
          raw = p.read_text(encoding="utf-8", errors="replace") if p.exists() else ""

          try:
              data = json.loads(raw) if raw.strip() else {}
          except json.JSONDecodeError:
              data = {"_parse_error": True, "_raw": raw[:800]}

          hotspots = (data.get("hotspots") or []) if isinstance(data, dict) else []

          lines = []
          if data.get("_parse_error"):
              lines.append("⚠️ Unable to parse SonarCloud response as JSON.")
              lines.append("")
              lines.append("Response (first 800 chars):")
              lines.append("```")
              lines.append((data.get("_raw") or "").strip())
              lines.append("```")
          elif not hotspots:
              lines.append("✅ No Security Hotspots reported on this PR.")
          else:
              lines.append(f"❌ **{len(hotspots)} Security Hotspot(s)** reported on this PR:")
              lines.append("")
              for i, hs in enumerate(hotspots[:10], 1):
                  rule = hs.get("ruleKey", "unknown-rule")
                  comp = hs.get("component", "unknown-file")
                  line = hs.get("line")
                  msg  = (hs.get("message") or "").strip().replace("\n", " ")
                  key  = hs.get("key")
                  loc = f"`{comp}`" + (f":{line}" if line else "")
                  suffix = f" (`{key}`)" if key else ""
                  lines.append(f"{i}. {loc} — **{rule}** — {msg}{suffix}")
              if len(hotspots) > 10:
                  lines.append("")
                  lines.append(f"_Showing 10 of {len(hotspots)}._")

          with open("sonar_report.md", "a", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          PY

          cat sonar_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment SonarCloud Hotspots on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('sonar_report.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
